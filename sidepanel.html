<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vocabulary</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1a1a;
        --muted: #6a6a6a;
        --bg: #ffffff;
        --card: #f6f6f6;
        --border: rgba(0, 0, 0, 0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #ececec;
          --muted: #9a9a9a;
          --bg: #1e1e1e;
          --card: #2a2a2a;
          --border: rgba(255, 255, 255, 0.14);
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 12px;
        font: 14px/1.45 system-ui, sans-serif;
        color: var(--fg);
        background: var(--bg);
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0;
        font-size: 15px;
      }
      #count {
        color: var(--muted);
        font-size: 12px;
      }
      #filter {
        width: 100%;
        padding: 7px 9px;
        margin-bottom: 10px;
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--bg);
        color: inherit;
      }
      .entry {
        padding: 9px 10px;
        margin-bottom: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
      }
      .entry-source {
        font-weight: 600;
        overflow-wrap: anywhere;
      }
      .entry-translation {
        margin-top: 2px;
        overflow-wrap: anywhere;
      }
      .entry-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 6px;
      }
      .entry-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .entry-langs {
        color: var(--muted);
        font-size: 12px;
      }
      .lang {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .speak {
        font: inherit;
        font-size: 13px;
        line-height: 1;
        padding: 2px 7px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      .speak:hover:not(:disabled) {
        background: var(--border);
      }
      .speak:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .delete {
        font: inherit;
        font-size: 12px;
        padding: 3px 9px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      .delete:hover {
        background: var(--border);
      }
      .state {
        color: var(--muted);
        padding: 20px 4px;
        text-align: center;
      }
      .setting {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 12px;
        cursor: pointer;
      }
      .primary {
        width: 100%;
        font: inherit;
        font-weight: 600;
        padding: 8px 12px;
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--card);
        color: inherit;
        cursor: pointer;
      }
      .primary:hover:not(:disabled) {
        background: var(--border);
      }
      .primary:disabled {
        opacity: 0.45;
        cursor: default;
      }
      .hidden {
        display: none;
      }
      .train-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }
      .progress {
        color: var(--muted);
        font-size: 12px;
      }
      .prompt {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 14px 12px;
        margin-bottom: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
      }
      .prompt-text {
        font-size: 17px;
        font-weight: 600;
        overflow-wrap: anywhere;
      }
      /* Long text is clamped; activating it expands in place. */
      .clamped {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .expandable {
        cursor: pointer;
      }
      .more {
        display: block;
        margin-top: 3px;
        padding: 0;
        border: 0;
        background: none;
        color: var(--muted);
        font-family: inherit;
        font-size: 11px;
        text-align: left;
        cursor: pointer;
      }
      .option-wrap {
        margin-bottom: 7px;
      }
      .option-wrap .more {
        margin: 2px 0 0 11px;
      }
      .option {
        display: block;
        width: 100%;
        text-align: left;
        font: inherit;
        padding: 9px 11px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        overflow-wrap: anywhere;
      }
      .option:hover:not(.answered) {
        background: var(--card);
      }
      .option.answered {
        cursor: default;
      }
      .option.correct {
        border-color: #2e7d32;
        background: rgba(46, 125, 50, 0.16);
      }
      .option.wrong {
        border-color: #c62828;
        background: rgba(198, 40, 40, 0.16);
      }
      .verdict {
        margin: 10px 0 4px;
        font-size: 13px;
        font-weight: 600;
      }
      .score {
        font-size: 15px;
        text-align: center;
        padding: 24px 4px 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Vocabulary</h1>
      <span id="count"></span>
    </header>
    <div id="vocab-view">
      <label class="setting">
        <input id="icon-toggle" type="checkbox" />
        Show icon when I select text
      </label>
      <button id="train-start" class="primary" type="button">Train</button>
      <input id="filter" type="search" placeholder="Filter…" autocomplete="off" />
      <div id="list"></div>
    </div>

    <div id="train-view" class="hidden">
      <div class="train-head">
        <span id="train-progress" class="progress"></span>
        <button id="train-exit" class="delete" type="button">Exit</button>
      </div>
      <div id="train-body"></div>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
